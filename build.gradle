plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.78'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

repositories {
    mavenCentral()
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
    maven {
        name = "Curse Maven"
        url = uri("https://cursemaven.com")
        content {
            includeGroup("curse.maven")
        }
    }
    maven { url "https://maven.blamejared.com/" }
    maven { url 'https://maven.terraformersmc.com/' }
    flatDir { dirs 'libs' }
}

base {
    archivesName = mod_id
}

tasks.named('jar', Jar).configure {
    from('LICENSE')
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        doorsData {
            data()
            systemProperty 'alltuttasneeds.datagen.profile', 'doors'
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        bedsData {
            data()
            systemProperty 'alltuttasneeds.datagen.profile', 'beds'
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    compileOnly "mezz.jei:jei-$minecraft_version-common-api:19.21.0.247"
    compileOnly "mezz.jei:jei-$minecraft_version-neoforge-api:19.21.0.247"
    localRuntime "mezz.jei:jei-$minecraft_version-neoforge:19.21.0.247"

    implementation "maven.modrinth:jade:15.10.5+neoforge"

    //implementation "maven.modrinth:clutter-no-more:2.0.3+1.21.1-neoforge"
    implementation "maven.modrinth:moonlight:1.21-2.29.29-neoforge"

    implementation "maven.modrinth:new_world:1.7.2"

    implementation "maven.modrinth:vanillabackport:rUSWdBok"
    implementation "maven.modrinth:i6fiqm5y:v7P0nBi2"

    implementation "maven.modrinth:the-block-box:0.1.1"

    implementation "maven.modrinth:farmers-delight:1.21.1-1.3.2"
    implementation "maven.modrinth:my-nethers-delight:1.8"

    implementation "curse.maven:malum-484064:7307339"
    implementation "maven.modrinth:lodestonelib:1.8.2"
    implementation "maven.modrinth:curios:9.5.1+1.21.1"

    implementation "maven.modrinth:no-mans-land:1.5.9"
    implementation "maven.modrinth:biolith:xaeaSA9Q"
    implementation "maven.modrinth:mixed-litter:1.2.2"

    implementation "curse.maven:enderscape-536638:6738966"
    implementation "maven.modrinth:trimmed:1.21-3.0.0+neoforge"
    implementation "maven.modrinth:yacl:3.7.1+1.21.1-neoforge"

    implementation "curse.maven:artsandcrafts-1034791:8041062"
    implementation "curse.maven:jinxedlib-1203401:6727693"

    implementation "maven.modrinth:natures-spirit:2.2.5-1.21.1"

    implementation "curse.maven:create-328085:7963363"

    implementation "curse.maven:biomes-o-plenty-220318:7251965"
    implementation "curse.maven:terrablender-neoforge-940057:6054947"
    implementation "maven.modrinth:glitchcore:S2TfWrZR"

    implementation "maven.modrinth:architects-palette:1.4.0-beta.5N"

    implementation "maven.modrinth:abundant-atmosphere:1.21.1-2.0.0-beta2.1"

    implementation "maven.modrinth:blueprint:8.1.0"

    implementation "maven.modrinth:upgrade-aquatic:7.0.1"
    implementation "maven.modrinth:atmospheric:7.0.1"
    implementation "maven.modrinth:autumnity:6.0.1"
    implementation "maven.modrinth:environmental:5.0.1"
    implementation "maven.modrinth:caverns-and-chasms:3.0.0"
    implementation "maven.modrinth:gallery:2.0.1"

    implementation "maven.modrinth:spawn-mod:4.0.4"

    implementation "maven.modrinth:woodworks:4.0.2"
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}